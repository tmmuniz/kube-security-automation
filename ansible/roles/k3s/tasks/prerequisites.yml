---
# 1. Instalação para Debian/Ubuntu
- name: Update cache and install packages (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - curl
      - nfs-common
      - open-iscsi
      - lsb-release
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == "Debian"

# 2. Instalação para Amazon Linux / RHEL
- name: Update cache and install packages (Amazon Linux/RHEL)
  ansible.builtin.dnf:
    name:
      - nfs-utils
      - iscsi-initiator-utils
      - tar
      - gzip
    state: present
    update_cache: true
    nobest: true
  become: true
  when: ansible_facts['os_family'] == "RedHat"

# 3. Desabilitar Swap
- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  become: true
  failed_when: false
  changed_when: false

- name: Remove swap from fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^\s*([^#]\S+\s+\S+\s+swap\s+.*)$'
    replace: '# \1'
  become: true

# 4. Módulos do Kernel
- name: Load br_netfilter module
  community.general.modprobe:
    name: br_netfilter
    state: present
  become: true

- name: Load overlay module
  community.general.modprobe:
    name: overlay
    state: present
  become: true

- name: Persist kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    mode: "0644"
    content: |
      br_netfilter
      overlay
  become: true

# 5. Parâmetros de Rede (Sysctl)
- name: Configure Kubernetes sysctl parameters
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-k3s.conf
    mode: "0644"
    content: |
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
  become: true
  notify: Reload sysctl