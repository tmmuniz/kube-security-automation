---
- name: Wait for two K3s nodes
  ansible.builtin.shell: |
    kubectl get nodes --no-headers | wc -l
  register: nodes
  retries: 30
  delay: 10
  until: nodes.stdout | int >= 2
  changed_when: false

- name: Show nodes
  ansible.builtin.command: kubectl get nodes -o wide
  register: out
  changed_when: false

- name: Print nodes
  ansible.builtin.debug:
    var: out.stdout_lines