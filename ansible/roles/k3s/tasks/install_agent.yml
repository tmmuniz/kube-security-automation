---
- name: Check if K3s agent service exists
  ansible.builtin.stat:
    path: /etc/systemd/system/k3s-agent.service
  register: k3s_agent_service

- name: Check K3s server API readyz from agent
  ansible.builtin.command: >
    curl -k --fail https://{{ k3s_server_private_ip }}:{{ k3s_api_port | default(6443) }}/readyz
  register: k3s_server_readyz
  retries: 12
  delay: 10
  until: k3s_server_readyz.rc == 0
  changed_when: false
  when: not k3s_agent_service.stat.exists

- name: Install K3s agent without auto-start
  ansible.builtin.shell: |
    set -e

    if [ -n "{{ k3s_version }}" ]; then
      export INSTALL_K3S_VERSION="{{ k3s_version }}"
    fi

    export INSTALL_K3S_SKIP_START=true

    curl -sfL "{{ k3s_install_script_url }}" | sh -s - agent \
      --server "https://{{ k3s_server_private_ip }}:{{ k3s_api_port | default(6443) }}" \
      --token "{{ k3s_token }}" \
      --node-name "{{ inventory_hostname }}" \
      --node-label "node-role.kubernetes.io/worker=true"
  args:
    executable: /bin/bash
  when: not k3s_agent_service.stat.exists
  no_log: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start K3s agent
  ansible.builtin.systemd:
    name: k3s-agent
    enabled: true
    state: started
  failed_when: false

- name: Wait for K3s agent service to become active
  ansible.builtin.command: systemctl is-active k3s-agent
  register: k3s_agent_status
  retries: 12
  delay: 10
  until: k3s_agent_status.stdout == "active"
  changed_when: false
  failed_when: false

- name: Show K3s agent service status
  ansible.builtin.command: systemctl status k3s-agent --no-pager
  register: k3s_agent_systemctl_status
  changed_when: false
  failed_when: false

- name: Print K3s agent service status
  ansible.builtin.debug:
    var: k3s_agent_systemctl_status.stdout_lines

- name: Show K3s agent logs
  ansible.builtin.command: journalctl -u k3s-agent -n 120 --no-pager
  register: k3s_agent_logs
  changed_when: false
  failed_when: false

- name: Print K3s agent logs
  ansible.builtin.debug:
    var: k3s_agent_logs.stdout_lines
