---
- name: Check if K3s agent service exists
  ansible.builtin.stat:
    path: /etc/systemd/system/k3s-agent.service
  register: k3s_agent_service

- name: Check K3s server API readyz from agent
  ansible.builtin.command: >
    curl -k https://{{ k3s_server_private_ip }}:{{ k3s_api_port | default(6443) }}/readyz
  register: k3s_server_readyz
  retries: 12
  delay: 10
  until: k3s_server_readyz.rc == 0 and "ok" in k3s_server_readyz.stdout
  changed_when: false
  when: not k3s_agent_service.stat.exists

- name: Install K3s agent
  ansible.builtin.shell: |
    # Garante que o diretório de binários existe e está no PATH
    mkdir -p /usr/local/bin
    
    # Executa a instalação passando as variáveis como ambiente para o SH
    curl -sfL https://get.k3s.io | INSTALL_K3S_SKIP_ENABLE=true sh -s - agent \
      --server "https://{{ k3s_server_private_ip }}:{{ k3s_api_port | default(6443) }}" \
      --token "{{ k3s_token }}" \
      --node-name "{{ inventory_hostname }}" \
      --node-label "node-role.kubernetes.io/worker=true"
  args:
    executable: /bin/bash
  become: true
  when: not k3s_agent_service.stat.exists

- name: Ensure K3s binary has execution permissions
  ansible.builtin.file:
    path: /usr/local/bin/k3s
    mode: '0755'
    owner: root
    group: root
  become: true

- name: Start and enable K3s agent service
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: true
    daemon_reload: true
  become: true
  register: agent_start
  ignore_errors: true

- name: Debug K3s failure if service not active
  ansible.builtin.command: journalctl -u k3s-agent -n 20 --no-pager
  become: true
  when: agent_start.failed
  register: k3s_logs

- name: Show K3s logs on failure
  ansible.builtin.debug:
    var: k3s_logs.stdout_lines
  when: agent_start.failed

- name: Fail if K3s agent is not active
  ansible.builtin.assert:
    that: not agent_start.failed
    msg: "O serviço k3s-agent falhou ao iniciar. Verifique os logs acima."
