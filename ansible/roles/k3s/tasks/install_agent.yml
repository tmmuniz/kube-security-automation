---
- name: Check if K3s agent service exists
  ansible.builtin.stat:
    path: /etc/systemd/system/k3s-agent.service
  register: k3s_agent_service

- name: Install K3s agent
  ansible.builtin.shell: |
    set -e

    # Define a versão do K3s se a variável existir
    {% if k3s_version is defined and k3s_version %}
    export INSTALL_K3S_VERSION="{{ k3s_version }}"
    {% endif %}

    # Executa o instalador apontando para o Server
    curl -sfL "{{ k3s_install_script_url | default('https://get.k3s.io') }}" | sh -s - agent \
      --server "https://{{ k3s_server_private_ip }}:{{ k3s_api_port | default(6443) }}" \
      --token "{{ k3s_token }}" \
      --node-name "{{ inventory_hostname }}" \
      --node-label "node-role.kubernetes.io/worker=true"
  args:
    executable: /bin/bash
  # FUNDAMENTAL: O instalador do K3s exige privilégios de root
  become: true
  when: not k3s_agent_service.stat.exists
  # Sugestão: Remova o no_log temporariamente se o erro persistir para ver o log do curl
  no_log: true