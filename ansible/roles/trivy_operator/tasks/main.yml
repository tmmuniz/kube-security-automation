---
- name: Check if Helm is installed
  ansible.builtin.command: helm version --short
  register: helm_check
  changed_when: false
  failed_when: false

- name: Install Helm if missing
  ansible.builtin.shell: |
    set -e
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    executable: /bin/bash
  when: helm_check.rc != 0

- name: Check if Aqua Helm repo exists
  ansible.builtin.command: helm repo list
  register: helm_repo_list
  changed_when: false
  failed_when: false

- name: Add Aqua Helm repository
  ansible.builtin.command: helm repo add aqua https://aquasecurity.github.io/helm-charts/
  when: "'aqua' not in helm_repo_list.stdout"
  changed_when: true

- name: Update Helm repositories
  ansible.builtin.command: helm repo update
  changed_when: false

- name: Install or upgrade Trivy Operator
  ansible.builtin.command: >
    helm upgrade --install trivy-operator aqua/trivy-operator
    --namespace trivy-system
    --create-namespace
    --version {{ trivy_operator_chart_version | default('0.32.1') }}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: trivy_install
  changed_when: >
    'Release "trivy-operator" has been upgraded' in trivy_install.stdout or
    'Release "trivy-operator" has been installed' in trivy_install.stdout

- name: Wait for Trivy Operator rollout
  ansible.builtin.command: >
    kubectl rollout status deployment/trivy-operator
    -n trivy-system
    --timeout=180s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Show Trivy Operator pods
  ansible.builtin.command: kubectl get pods -n trivy-system -o wide
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: trivy_pods
  changed_when: false

- name: Print Trivy Operator pods
  ansible.builtin.debug:
    var: trivy_pods.stdout_lines

- name: Wait before reading Trivy reports
  ansible.builtin.pause:
    seconds: 60

- name: Show VulnerabilityReports
  ansible.builtin.command: kubectl get vulnerabilityreports -A
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: vulnerability_reports
  changed_when: false
  failed_when: false

- name: Print VulnerabilityReports
  ansible.builtin.debug:
    var: vulnerability_reports.stdout_lines

- name: Show ConfigAuditReports
  ansible.builtin.command: kubectl get configauditreports -A
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: configaudit_reports
  changed_when: false
  failed_when: false

- name: Print ConfigAuditReports
  ansible.builtin.debug:
    var: configaudit_reports.stdout_lines

- name: Show RbacAssessmentReports
  ansible.builtin.command: kubectl get rbacassessmentreports -A
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: rbac_reports
  changed_when: false
  failed_when: false

- name: Print RbacAssessmentReports
  ansible.builtin.debug:
    var: rbac_reports.stdout_lines


- name: Create Trivy report directory
  ansible.builtin.file:
    path: /tmp/trivy-html-report
    state: directory
    mode: "0755"

- name: Export VulnerabilityReports to text
  ansible.builtin.shell: |
    kubectl get vulnerabilityreports -A -o wide > /tmp/trivy-html-report/vulnerabilityreports.txt || true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Export ConfigAuditReports to text
  ansible.builtin.shell: |
    kubectl get configauditreports -A -o wide > /tmp/trivy-html-report/configauditreports.txt || true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Export RbacAssessmentReports to text
  ansible.builtin.shell: |
    kubectl get rbacassessmentreports -A -o wide > /tmp/trivy-html-report/rbacassessmentreports.txt || true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Generate Trivy HTML report on remote host
  ansible.builtin.shell: |
    cat > /tmp/trivy-html-report/trivy-operator-report.html <<'EOF'
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <title>Trivy Operator Security Report</title>
      <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; color: #222; }
        h1 { color: #111; }
        h2 { margin-top: 32px; color: #333; }
        .meta { color: #555; margin-bottom: 24px; }
        .card { background: white; padding: 24px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        pre { background: #111; color: #eee; padding: 16px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; }
      </style>
    </head>
    <body>
      <h1>Trivy Operator Security Report</h1>
      <p class="meta">Generated by Kubernetes Trivy Operator via Ansible.</p>

      <div class="card">
        <h2>Vulnerability Reports</h2>
        <pre>
    EOF

    cat /tmp/trivy-html-report/vulnerabilityreports.txt >> /tmp/trivy-html-report/trivy-operator-report.html

    cat >> /tmp/trivy-html-report/trivy-operator-report.html <<'EOF'
        </pre>
      </div>

      <div class="card">
        <h2>Config Audit Reports</h2>
        <pre>
    EOF

    cat /tmp/trivy-html-report/configauditreports.txt >> /tmp/trivy-html-report/trivy-operator-report.html

    cat >> /tmp/trivy-html-report/trivy-operator-report.html <<'EOF'
        </pre>
      </div>

      <div class="card">
        <h2>RBAC Assessment Reports</h2>
        <pre>
    EOF

    cat /tmp/trivy-html-report/rbacassessmentreports.txt >> /tmp/trivy-html-report/trivy-operator-report.html

    cat >> /tmp/trivy-html-report/trivy-operator-report.html <<'EOF'
        </pre>
      </div>
    </body>
    </html>
    EOF
  args:
    executable: /bin/bash
  changed_when: true

- name: Upload Trivy HTML report to S3
  ansible.builtin.command: >
    aws s3 cp /tmp/trivy-html-report/trivy-operator-report.html
    s3://{{ trivy_reports_bucket_name }}/{{ trivy_reports_s3_prefix }}/{{ github_run_id }}/trivy-operator-report.html
    --content-type text/html
  changed_when: true

- name: Print S3 report path
  ansible.builtin.debug:
    msg: "Trivy HTML report uploaded to s3://{{ trivy_reports_bucket_name }}/{{ trivy_reports_s3_prefix }}/trivy-operator-report.html"