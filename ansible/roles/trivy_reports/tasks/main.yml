---
- name: Create report directory
  ansible.builtin.file:
    path: /tmp/trivy-reports
    state: directory
    mode: "0755"

- name: Get VulnerabilityReports
  ansible.builtin.command: kubectl get vulnerabilityreports -A -o json > /tmp/trivy-reports/vulnerabilityreports.txt
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: vulnerability_reports_result
  changed_when: false
  failed_when: false

- name: Get ConfigAuditReports
  ansible.builtin.command: kubectl get configauditreports -A -o json > /tmp/trivy-reports/configauditreports.txt
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: configaudit_reports_result
  changed_when: false
  failed_when: false

- name: Get RBAC Assessment Reports
  ansible.builtin.command: kubectl get rbacassessmentreports -A -o json > /tmp/trivy-reports/rbacreports.txt
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: rbac_reports_result
  changed_when: false
  failed_when: false

- name: Fetch VulnerabilityReports to runner
  ansible.builtin.fetch:
    src: /tmp/trivy-reports/vulnerabilityreports.txt
    dest: ../trivy-output/vulnerabilityreports.txt
    flat: true

- name: Fetch ConfigAuditReports to runner
  ansible.builtin.fetch:
    src: /tmp/trivy-reports/configauditreports.txt
    dest: ../trivy-output/configauditreports.txt
    flat: true

- name: Fetch RBAC Reports to runner
  ansible.builtin.fetch:
    src: /tmp/trivy-reports/rbacreports.txt
    dest: ../trivy-output/rbacreports.txt
    flat: true