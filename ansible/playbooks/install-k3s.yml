
- name: Prepare nodes
  hosts: k3s_cluster
  become: true
  gather_facts: true
  tasks:
    - import_role:
        name: k3s
        tasks_from: prerequisites

- name: Install server
  hosts: k3s_server
  become: true
  tasks:
    - import_role:
        name: k3s
        tasks_from: install_server

- name: Install agent
  hosts: k3s_agent
  become: true
  tasks:
    - import_role:
        name: k3s
        tasks_from: install_agent

- name: Validate cluster
  hosts: k3s_server
  become: true
  tasks:
    - import_role:
        name: k3s
        tasks_from: validate
